{% extends 'base.html' %}

{% block title %}{{ title }} — Технично{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">{{ title }}</h4>
    <a href="{% url 'orders:list' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Назад
    </a>
</div>

<form method="post">
    {% csrf_token %}
    <div class="row g-3">

        <!-- Клиент -->
        <div class="col-12">
            <div class="card">
                <div class="card-header bg-light">
                    <h6 class="mb-0"><i class="bi bi-person"></i> Клиент</h6>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">ФИО клиента *</label>
                            <input type="text" name="client_name" class="form-control"
                                   value="{% if order %}{{ order.client.full_name }}{% endif %}"
                                   required placeholder="Иванов Иван Иванович">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Телефон *</label>
                            <input type="text" name="client_phone" class="form-control"
                                   value="{% if order %}{{ order.client.phone }}{% endif %}"
                                   required placeholder="+7 (999) 123-45-67">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="client_email" class="form-control"
                                   value="{% if order %}{{ order.client.email }}{% endif %}"
                                   placeholder="email@example.com">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Устройство -->
        <div class="col-12">
            <div class="card">
                <div class="card-header bg-light">
                    <h6 class="mb-0"><i class="bi bi-phone"></i> Устройство</h6>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">Марка *</label>
                            <input type="text" name="device_brand" class="form-control"
                                   value="{% if order %}{{ order.device_brand }}{% endif %}"
                                   required placeholder="Samsung, Apple, Xiaomi...">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Модель *</label>
                            <input type="text" name="device_model" class="form-control"
                                   value="{% if order %}{{ order.device_model }}{% endif %}"
                                   required placeholder="Galaxy S21, iPhone 13...">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">IMEI</label>
                            <input type="text" name="imei" class="form-control"
                                   value="{% if order %}{{ order.imei }}{% endif %}"
                                   placeholder="15 цифр">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Предв. стоимость (руб.)</label>
                            <input type="number" name="estimated_cost" class="form-control"
                                   value="{% if order %}{{ order.estimated_cost }}{% endif %}"
                                   placeholder="0.00" step="0.01">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Описание дефекта *</label>
                            <textarea name="defect_description" class="form-control"
                                      rows="3" required
                                      placeholder="Опишите проблему с устройством...">{% if order %}{{ order.defect_description }}{% endif %}</textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Примечания</label>
                            <textarea name="notes" class="form-control" rows="2"
                                      placeholder="Дополнительная информация...">{% if order %}{{ order.notes }}{% endif %}</textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12">
            <button type="submit" class="btn btn-primary btn-lg">
                <i class="bi bi-save"></i> Сохранить заказ
            </button>
            <a href="{% url 'orders:list' %}" class="btn btn-outline-secondary btn-lg ms-2">
                Отмена
            </a>
        </div>
    </div>
</form>
{% endblock %}
