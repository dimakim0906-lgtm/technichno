<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ООО Технично{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar {
            min-height: 100vh;
            background: #212529;
            padding-top: 20px;
        }
        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            display: block;
            padding: 10px 20px;
            border-radius: 5px;
            margin: 2px 10px;
        }
        .sidebar a:hover, .sidebar a.active {
            background: #495057;
            color: white;
        }
        .sidebar .brand {
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 10px 20px 20px;
            border-bottom: 1px solid #495057;
            margin-bottom: 10px;
        }
        .main-content { padding: 20px; }
        .badge-Принят { background-color: #0d6efd; }
        .badge-Диагностика { background-color: #ffc107; color: #000; }
        .badge-В\ ремонте { background-color: #dc3545; }
        .badge-Готов\ к\ выдаче { background-color: #198754; }
        .badge-Выдан { background-color: #6c757d; }
        .badge-Отказ { background-color: #343a40; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Боковое меню -->
        <div class="col-md-2 sidebar p-0">
            <div class="brand">
                <i class="bi bi-phone-fill"></i> Технично
            </div>

            {% if user.is_authenticated %}
            <a href="/" {% if request.path == '/' %}class="active"{% endif %}>
                <i class="bi bi-speedometer2"></i> Главная
            </a>
            <a href="/orders/" {% if '/orders/' in request.path %}class="active"{% endif %}>
                <i class="bi bi-clipboard-list"></i> Заказы
            </a>
            <a href="/clients/" {% if '/clients/' in request.path %}class="active"{% endif %}>
                <i class="bi bi-people"></i> Клиенты
            </a>
            <a href="/reports/" {% if '/reports/' in request.path %}class="active"{% endif %}>
                <i class="bi bi-bar-chart"></i> Отчёты
            </a>

            {% if user.is_superuser %}
            <a href="/admin/" target="_blank">
                <i class="bi bi-gear"></i> Администрация
            </a>
            {% endif %}

            <hr style="border-color: #495057;">
            <a href="/accounts/logout/">
                <i class="bi bi-box-arrow-left"></i> Выйти ({{ user.username }})
            </a>
            {% endif %}
        </div>

        <!-- Основной контент -->
        <div class="col-md-10 main-content">
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
            {% endif %}

            {% block content %}{% endblock %}
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
